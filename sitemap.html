<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All sectors | Cobbles & Climbs</title>
    <meta name="description" content="All sectors - Cobbles & Climbs">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <style>
        body {
            font-family: "Roboto", Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
            color: #222;
        }
        h1 {
            color: #1a3c34;
            border-bottom: 3px solid #1a3c34;
            padding-bottom: 10px;
        }
        ul {
            columns: 2;
            column-gap: 40px;
            list-style: none;
            padding: 0;
        }
        li {
            margin-bottom: 6px;
            break-inside: avoid;
        }
        a {
            color: #1a3c34;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
            color: #e07b00;
        }
        .back {
            display: inline-block;
            margin-top: 40px;
            color: #1a3c34;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h1>Alle sectors & climbs</h1>
    <p>All sectors | Cobbles & Climbs</p>

    <ul id="sectorList">
        <!-- Hier komt automatisch de lijst via JavaScript -->
    </ul>

    <a href="index.html" class="back">Back home</a>

<script>
// Laad sectors.json en maak de lijst
fetch('sectors.json')
    .then(r => r.json())
    .then(data => {
        const sectors = data.sectors || [];
        // Sorteer alfabetisch op naam
        sectors.sort((a, b) => a.name.localeCompare(b.name));

        const container = document.getElementById('sectorList');
        let html = '';

        sectors.forEach(s => {
            if (!s.name) return;
            const slug = s.name
                .toLowerCase()
                .normalize('NFD').replace(/[̀-ͯ]/g, '')
                .replace(/[^a-z0-9\s-]/g, '')
                .trim()
                .replace(/\s+/g, '-');
            
            html += `<li><a href="sectors/${slug}.html">${s.name}</a></li>`;
        });

        container.innerHTML = html;
    })
    .catch(() => {
        document.getElementById('sectorList').innerHTML = 
            '<li>Kon sectors.json niet laden. Controleer of het bestand in de root staat.</li>';
    });
</script>

</body>
</html>
